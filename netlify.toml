# Netlify deployment config for B The Change static site
# Drag-and-drop the project root, or connect this repo — Netlify will use this file.

[build]
  publish = "."
  command = ""   # No build step needed — pure static HTML/CSS/JS

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# 404 page (Netlify uses this automatically when a route doesn't match)
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
